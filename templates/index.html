<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restricted Content</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        body{min-height:100vh;background:#050505;font-family:'Outfit',sans-serif;color:#e0e0e0;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
        body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,255,.03) 1px,transparent 1px);background-size:60px 60px;animation:gridDrift 20s linear infinite;z-index:0}
        @keyframes gridDrift{to{transform:translate(60px,60px)}}
        body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);pointer-events:none;z-index:100}
        .orb{position:fixed;border-radius:50%;filter:blur(100px);opacity:.25;z-index:0;animation:orbFloat 12s ease-in-out infinite alternate}
        .orb-1{width:500px;height:500px;background:#00ffff;top:-150px;left:-100px}
        .orb-2{width:400px;height:400px;background:#a855f7;bottom:-100px;right:-80px;animation-delay:-4s;animation-duration:15s}
        .orb-3{width:300px;height:300px;background:#6366f1;top:50%;left:60%;animation-delay:-8s;animation-duration:18s}
        @keyframes orbFloat{0%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,-30px) scale(1.1)}100%{transform:translate(-20px,20px) scale(.95)}}
        .container{position:relative;z-index:10;width:100%;max-width:520px;padding:48px 40px;background:rgba(255,255,255,.03);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.06);border-radius:24px;box-shadow:0 0 40px rgba(0,255,255,.04),0 0 80px rgba(168,85,247,.03),inset 0 1px 0 rgba(255,255,255,.05);animation:reveal .8s cubic-bezier(.16,1,.3,1) forwards;opacity:0;transform:translateY(30px)}
        @keyframes reveal{to{opacity:1;transform:translateY(0)}}
        .container::before{content:'';position:absolute;top:0;left:40px;right:40px;height:2px;background:linear-gradient(90deg,transparent,#00ffff,#a855f7,transparent);border-radius:2px}
        .badge{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:100px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#f87171;margin-bottom:28px}
        .dot{width:6px;height:6px;background:#ef4444;border-radius:50%;animation:pulse 2s ease-in-out infinite;box-shadow:0 0 8px #ef4444}
        @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
        h1{font-size:32px;font-weight:700;letter-spacing:-.5px;background:linear-gradient(135deg,#fff,#a0a0a0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:10px}
        .sub{font-family:'JetBrains Mono',monospace;font-size:13px;color:rgba(255,255,255,.35);margin-bottom:36px;line-height:1.6}
        .sub span{color:#00ffff}
        .lbl{display:block;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:10px}
        .field{width:100%;padding:16px 20px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;font-family:'JetBrains Mono',monospace;font-size:15px;color:#fff;outline:none;transition:all .3s}
        .field::placeholder{color:rgba(255,255,255,.15)}
        .field:focus{border-color:rgba(0,255,255,.4);box-shadow:0 0 0 3px rgba(0,255,255,.08),0 0 20px rgba(0,255,255,.05);background:rgba(255,255,255,.06)}
        .btn{width:100%;padding:16px 24px;margin-top:24px;background:linear-gradient(135deg,rgba(0,255,255,.12),rgba(168,85,247,.12));border:1px solid rgba(0,255,255,.2);border-radius:14px;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#00ffff;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
        .btn:hover{border-color:rgba(0,255,255,.5);box-shadow:0 0 30px rgba(0,255,255,.1),0 0 60px rgba(168,85,247,.05);transform:translateY(-2px)}
        .btn:active{transform:translateY(0)}
        .foot{margin-top:28px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(255,255,255,.15);letter-spacing:1px}
        .blink{animation:blink 1.2s step-end infinite;color:#00ffff}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
        @media(max-width:580px){.container{margin:20px;padding:36px 28px}h1{font-size:26px}}
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="container">
        <div class="badge"><div class="dot"></div>ACTIVE MONITORING</div>
        <h1>Restricted Content</h1>
        <form action="/submit" method="POST" autocomplete="off">
            <label class="lbl" for="nameInput">Full Name</label>
            <input type="text" id="nameInput" name="name" class="field" placeholder="Enter your full name..." required autofocus>
            <button type="submit" class="btn" id="submitBtn">▶ Verify Identity</button>
        </form>
        <p class="foot">SYSTEM v3.7.1 &nbsp;•&nbsp; Tracking enabled<span class="blink">_</span></p>
    </div>
</body>
</html>
