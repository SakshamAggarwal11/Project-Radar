<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAUGHT</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        body{min-height:100vh;background:#050505;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;flex-direction:column}
        body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,0,100,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,0,100,.03) 1px,transparent 1px);background-size:60px 60px;z-index:0}
        body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.1) 2px,rgba(0,0,0,.1) 4px);pointer-events:none;z-index:100}
        .orb{position:fixed;border-radius:50%;filter:blur(120px);opacity:.3;z-index:0;animation:orbFloat 10s ease-in-out infinite alternate}
        .orb-1{width:600px;height:600px;background:#ff0066;top:-200px;left:-150px}
        .orb-2{width:500px;height:500px;background:#a855f7;bottom:-150px;right:-100px;animation-delay:-3s}
        @keyframes orbFloat{0%{transform:translate(0,0) scale(1)}100%{transform:translate(30px,-20px) scale(1.1)}}
        .content{position:relative;z-index:10;text-align:center;animation:revealUp 1s cubic-bezier(.16,1,.3,1) forwards;opacity:0;transform:translateY(40px)}
        @keyframes revealUp{to{opacity:1;transform:translateY(0)}}
        .icon{font-size:80px;margin-bottom:20px;animation:iconPulse 2s ease-in-out infinite}
        @keyframes iconPulse{0%,100%{transform:scale(1);filter:drop-shadow(0 0 20px rgba(255,0,102,.5))}50%{transform:scale(1.1);filter:drop-shadow(0 0 40px rgba(255,0,102,.8))}}
        h1{font-family:'Outfit',sans-serif;font-size:clamp(60px,12vw,120px);font-weight:900;letter-spacing:6px;text-transform:uppercase;color:#ff0066;text-shadow:0 0 20px rgba(255,0,102,.6),0 0 60px rgba(255,0,102,.3),0 0 120px rgba(255,0,102,.15);line-height:1;margin-bottom:16px;animation:textGlow 3s ease-in-out infinite}
        @keyframes textGlow{0%,100%{text-shadow:0 0 20px rgba(255,0,102,.6),0 0 60px rgba(255,0,102,.3),0 0 120px rgba(255,0,102,.15)}50%{text-shadow:0 0 30px rgba(255,0,102,.8),0 0 80px rgba(255,0,102,.5),0 0 150px rgba(255,0,102,.25)}}
        .sub{font-family:'JetBrains Mono',monospace;font-size:14px;color:rgba(255,255,255,.3);letter-spacing:2px;text-transform:uppercase;margin-bottom:40px;animation:revealUp 1s cubic-bezier(.16,1,.3,1) .3s forwards;opacity:0;transform:translateY(20px)}
        .box{display:inline-block;padding:14px 36px;background:rgba(255,0,102,.06);border:1px solid rgba(255,0,102,.2);border-radius:14px;font-family:'JetBrains Mono',monospace;font-size:12px;color:rgba(255,255,255,.4);letter-spacing:1px;animation:revealUp 1s cubic-bezier(.16,1,.3,1) .6s forwards;opacity:0;transform:translateY(20px)}
        .box span{color:#ff0066;font-weight:700}
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="content">
        <div class="icon">🎯</div>
        <h1>{{ message }}</h1>
        <p class="sub">Your data has been logged</p>
        <div class="box"><span>IP</span>, <span>Device</span>, and <span>Identity</span> recorded</div>
    </div>
</body>
</html>
